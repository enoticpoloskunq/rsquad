# GitLab CI/CD for Raccoon Squad VPN
# Builds APK automatically on push and tags

image: eclipse-temurin:17-jdk

variables:
  ANDROID_COMPILE_SDK: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_SDK_TOOLS: "11076708"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

before_script:
  # Install Android SDK
  - apt-get --quiet update --yes
  - apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
  - mkdir -p android-sdk
  - export ANDROID_HOME=$PWD/android-sdk
  - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
  - wget --quiet --output-document=android-sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS}_latest.zip
  - unzip -d android-sdk android-sdk.zip
  - mkdir -p android-sdk/cmdline-tools/latest
  - mv android-sdk/cmdline-tools/bin android-sdk/cmdline-tools/latest/ 2>/dev/null || true
  - mv android-sdk/cmdline-tools/lib android-sdk/cmdline-tools/latest/ 2>/dev/null || true
  - mv android-sdk/cmdline-tools/NOTICE.txt android-sdk/cmdline-tools/latest/ 2>/dev/null || true
  - mv android-sdk/cmdline-tools/source.properties android-sdk/cmdline-tools/latest/ 2>/dev/null || true
  - echo y | sdkmanager --licenses || true
  - echo y | sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" >/dev/null
  - echo y | sdkmanager "build-tools;${ANDROID_BUILD_TOOLS}" >/dev/null
  - chmod +x ./gradlew

# Cache Gradle and Android SDK between builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .gradle/
    - android-sdk/
    - app/libs/libv2ray.aar

stages:
  - build
  - release

# Build Debug APK
build_debug:
  stage: build
  only:
    - master
    - main
    - merge_requests
  script:
    - mkdir -p app/libs
    - if [ ! -f app/libs/libv2ray.aar ]; then
        curl -L -o app/libs/libv2ray.aar "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar";
      fi
    - ./gradlew assembleDebug --no-daemon
  artifacts:
    name: "raccoon-squad-debug-${CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 1 week

# Build Release APK
build_release:
  stage: build
  only:
    - master
    - main
    - tags
  script:
    - mkdir -p app/libs
    - if [ ! -f app/libs/libv2ray.aar ]; then
        curl -L -o app/libs/libv2ray.aar "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar";
      fi
    - ./gradlew assembleRelease --no-daemon
  artifacts:
    name: "raccoon-squad-release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/release/*.apk
    expire_in: 1 month

# Create GitLab Release on tag
create_release:
  stage: release
  only:
    - tags
  needs:
    - build_release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: "Raccoon Squad $CI_COMMIT_TAG"
    description: |
      ## 🦝 Raccoon Squad $CI_COMMIT_TAG

      ### Скачать
      | Файл | Описание |
      |------|----------|
      | `*-arm64-v8a-*.apk` | **Рекомендуется** - для большинства современных устройств |
      | `*-armeabi-v7a-*.apk` | Для старых 32-битных устройств |

      ### Особенности
      - 🛡️ Kill Switch - блокировка интернета при обрыве VPN
      - 🔄 Auto-reconnect - автоматическое переподключение
      - 🌍 56 стран с флагами
      - ✈️ Pre-flight check - проверка нод перед подключением
      - 🚀 R8 обфускация в release

      ### Установка
      Скачайте APK и установите на устройство. Требуется Android 7.0+
    assets:
      links:
        - name: "arm64-v8a Release APK"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/app/build/outputs/apk/release/app-arm64-v8a-release.apk?job=build_release"
        - name: "armeabi-v7a Release APK"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/app/build/outputs/apk/release/app-armeabi-v7a-release.apk?job=build_release"
