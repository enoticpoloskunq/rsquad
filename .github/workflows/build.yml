name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
    
    - name: Download libv2ray.aar
      run: |
        mkdir -p app/libs
        # ✅ FIXED: Pin specific version instead of 'latest' to avoid breaking changes
        # Check available versions: https://github.com/2dust/AndroidLibXrayLite/releases
        LIBV2RAY_VERSION="v26.2.6"
        
        curl -L -o app/libs/libv2ray.aar \
          "https://github.com/2dust/AndroidLibXrayLite/releases/download/${LIBV2RAY_VERSION}/libv2ray.aar"
        
        # ✅ Optional: Verify SHA256 checksum (find hash on release page)
        # echo "EXPECTED_HASH_HERE  app/libs/libv2ray.aar" | sha256sum -c - || exit 1
        
        echo "✅ Downloaded libv2ray.aar ${LIBV2RAY_VERSION}: $(ls -lh app/libs/libv2ray.aar)"
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
