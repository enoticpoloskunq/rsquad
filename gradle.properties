# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Jetifier is deprecated in AGP 9.0 - most libs use AndroidX now
android.enableJetifier=false

# Build Performance Optimizations (Gradle 9.3)
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn

# Daemon for faster builds
org.gradle.daemon=true

# Enable build profiling
# org.gradle.profile=true

# Kotlin
kotlin.code.style=official
